name: my-agent
description: What this agent does
# provider: my-provider       # optional — inherits defaultProvider from omni-ai.yaml
# model: my-model             # optional — inherits defaultModel from the provider config
systemPrompt: |
  You are a helpful assistant specialized in...
  Describe the agent's role, constraints, and expected behavior here.
skills:
  - skill-name               # skills the agent can use (must be registered)
maxIterations: 10
temperature: 0.3
