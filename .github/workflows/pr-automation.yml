name: PR Automation

on:
  pull_request:
    types: [opened, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  automate:
    name: Assign & Label
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to author
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.actor],
            });
            console.log(`Assigned PR #${context.issue.number} to @${context.actor}`);

      - name: Label PR by branch prefix
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const prefixToLabel = {
              feat:     'type: feat',
              fix:      'type: fix',
              chore:    'type: chore',
              docs:     'type: docs',
              test:     'type: test',
              release:  'type: release',
              refactor: 'type: refactor',
              perf:     'type: perf',
            };
            const prefix = branch.split('/')[0];
            const label = prefixToLabel[prefix];
            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
              console.log(`Applied label '${label}' from branch prefix '${prefix}'`);
            } else {
              console.log(`No label mapping for prefix '${prefix}' — skipping`);
            }
