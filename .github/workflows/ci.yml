name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Test & Coverage
    needs: [quality, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  branch-name:
    name: Branch Naming Convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|test|release|refactor|perf)/.+' || \
             echo "$BRANCH" | grep -q '^dependabot/'; then
            echo "✓ Branch '$BRANCH' follows naming convention"
          else
            echo "✗ Branch '$BRANCH' does not follow naming convention"
            echo ""
            echo "Required pattern:  <type>/<description>"
            echo "Allowed types:     feat | fix | chore | docs | test | release | refactor | perf"
            echo ""
            echo "Examples:"
            echo "  feat/omni-new-command"
            echo "  fix/config-loading-error"
            echo "  chore/update-dependencies"
            echo "  docs/provider-setup-guide"
            exit 1
          fi
